name: Deploy to GitHub Pages

# Publishes the static site in ./deepx-clone to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy job needs to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (deepx-clone)
        uses: actions/upload-pages-artifact@v3
        with:
          path: deepx-clone

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
