name: Deploy to GitHub Pages

# Publishes the static site at the repo root to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy job needs to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Append ?v=<commit-sha> to the custom CSS/JS refs in index.html so an
      # updated deploy never serves a stale browser-cached copy (no hard refresh
      # needed). Source stays clean; only the published copy is stamped.
      - name: Cache-bust custom assets
        run: |
          SHA="${GITHUB_SHA::8}"
          sed -i -E 's/(href|src)="(header\.css|reveal\.css|popup\.css|dark\.css|header\.js|reveal\.js|popup\.js|i18n\.js)"/\1="\2?v='"$SHA"'"/g' index.html
          echo "Stamped index.html assets with ?v=$SHA"
          grep -oE '(href|src)="[a-z0-9]+\.(css|js)\?v=[0-9a-f]+"' index.html || true

      - name: Upload site (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
